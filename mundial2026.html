<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Widget Mundial FIFA 2026</title>

<style>

body{
margin:0;
background:transparent;
font-family:Arial,Helvetica,sans-serif;
}


#wrapper{

width:1050px;
max-width:100%;

background:#fff;

border-radius:15px;

overflow:hidden;

box-shadow:0 5px 20px rgba(0,0,0,.25);

}



.header{

height:60px;

background:linear-gradient(90deg,#003b7a,#008ee8);

color:white;

display:flex;

align-items:center;

justify-content:space-between;

padding:0 25px;

font-size:24px;

font-weight:bold;

}


.tag{

background:#ffd700;

color:#003b7a;

padding:7px 14px;

border-radius:20px;

font-size:12px;

}


.match{

display:flex;

justify-content:space-between;

align-items:center;

padding:12px 20px;

border-bottom:1px solid #ddd;

}



.team{

font-size:17px;

font-weight:bold;

line-height:28px;

}



.flag{

width:28px;

vertical-align:middle;

margin-right:5px;

}



.time{

background:#003b7a;

color:white;

padding:8px 15px;

border-radius:8px;

}



.score{

background:#198754;

color:white;

padding:8px 15px;

border-radius:8px;

font-weight:bold;

}



.live{

background:#e60000;

color:white;

padding:5px 12px;

border-radius:20px;

font-size:12px;

font-weight:bold;

}



.next{

background:#eef5ff;

color:#003b7a;

padding:10px;

font-weight:bold;

}



.loading{

text-align:center;

padding:80px 0;

font-size:20px;

}


</style>

</head>


<body>


<div id="wrapper">


<div class="header">

⚽ MUNDIAL FIFA 2026

<div class="tag">
ACTUALIZADO
</div>

</div>


<div id="content">

<div class="loading">
Cargando partidos...
</div>

</div>


</div>
