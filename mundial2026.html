<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>Widget Mundial FIFA 2026</title>

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:transparent;
}


.widget{

width:1050px;
height:250px;

background:#fff;

border-radius:14px;

overflow:hidden;

box-shadow:0 4px 18px rgba(0,0,0,.25);

}



.cabecera{

height:55px;

background:linear-gradient(90deg,#003b7a,#0084d8);

color:white;

display:flex;

align-items:center;

justify-content:space-between;

padding:0 25px;

font-size:24px;

font-weight:bold;

}



.estado{

background:#ffd700;

color:#003b7a;

font-size:13px;

padding:7px 14px;

border-radius:20px;

}



.partido{

height:48px;

display:flex;

justify-content:space-between;

align-items:center;

padding:0 25px;

border-bottom:1px solid #ddd;

font-size:17px;

}



.equipos{

font-weight:bold;

}



.hora{

background:#003b7a;

color:white;

padding:6px 16px;

border-radius:8px;

}



.resultado{

background:#198754;

color:white;

padding:6px 16px;

border-radius:8px;

}



.cargando{

text-align:center;

padding-top:70px;

font-size:20px;

}


</style>

</head>


<body>


<div class="widget">


<div class="cabecera">

⚽ MUNDIAL FIFA 2026


<div class="estado">

FIXTURE OFICIAL

</div>


</div>



<div id="partidos">

<div class="cargando">

Cargando partidos...

</div>

</div>


</div>



<script>


const fuente =
"https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.json";


// Traducción de equipos

function traducir(nombre){


const equipos={

"France":"Francia",
"Senegal":"Senegal",
"Iraq":"Irak",
"Iran":"Irán",
"Norway":"Noruega",
"Argentina":"Argentina",
"Algeria":"Argelia",
"Brazil":"Brasil",
"Morocco":"Marruecos",
"Spain":"España",
"Cape Verde":"Cabo Verde",
"Austria":"Austria",
"Jordan":"Jordania",
"Germany":"Alemania",
"Italy":"Italia",
"Portugal":"Portugal",
"Mexico":"México",
"USA":"Estados Unidos",
"Canada":"Canadá"

};


return equipos[nombre] || nombre;


}



fetch(fuente+"?v="+Date.now())


.then(res=>res.json())


.then(datos=>{


let lista=datos.matches;


// fecha actual

let hoy=new Date();


let partidosHoy=lista.filter(p=>{


let fecha=new Date(p.date);


return fecha.getDate()==hoy.getDate()
&&
fecha.getMonth()==hoy.getMonth()
&&
fecha.getFullYear()==hoy.getFullYear();


});



// si no encuentra hoy muestra próximos

if(partidosHoy.length===0){

partidosHoy=lista.slice(0,5);

}



let html="";



partidosHoy.forEach(p=>{


let marcador;



if(p.score && p.score.ft){


marcador=

`

<div class="resultado">

${p.score.ft[0]}
-
${p.score.ft[1]}

</div>

`;


}else{


marcador=

`

<div class="hora">

${p.time || "Horario"}

</div>

`;

}



html+=`

<div class="partido">


<div class="equipos">

${traducir(p.team1)}

<br>

${traducir(p.team2)}

</div>


${marcador}


</div>

`;



});



document
.getElementById("partidos")
.innerHTML=html;



})


.catch(()=>{


document
.getElementById("partidos")
.innerHTML=

"<div class='cargando'>No se pudo cargar el Mundial</div>";

});



</script>


</body>

</html>
