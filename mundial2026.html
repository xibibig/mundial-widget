<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Widget Mundial FIFA 2026</title>

<style>

body{
margin:0;
background:transparent;
font-family:Arial,Helvetica,sans-serif;
}


#wrapper{

width:1050px;
max-width:100%;

background:#fff;

border-radius:15px;

overflow:hidden;

box-shadow:0 5px 20px rgba(0,0,0,.25);

}


.header{

height:60px;

background:linear-gradient(90deg,#003b7a,#008ee8);

color:white;

display:flex;

align-items:center;

justify-content:space-between;

padding:0 25px;

font-size:24px;

font-weight:bold;

}



.tag{

background:#ffd700;

color:#003b7a;

padding:7px 14px;

border-radius:20px;

font-size:12px;

}



.match{

display:flex;

justify-content:space-between;

align-items:center;

padding:12px 20px;

border-bottom:1px solid #ddd;

}



.team{

font-size:17px;

font-weight:bold;

line-height:28px;

}



.flag{

width:28px;

vertical-align:middle;

margin-right:5px;

}



.time{

background:#003b7a;

color:white;

padding:8px 15px;

border-radius:8px;

}



.score{

background:#198754;

color:white;

padding:8px 15px;

border-radius:8px;

font-weight:bold;

}



.live{

background:#e60000;

color:white;

padding:5px 12px;

border-radius:20px;

font-size:12px;

font-weight:bold;

}



.next{

background:#eef5ff;

color:#003b7a;

padding:10px;

font-weight:bold;

}



.loading{

text-align:center;

padding:80px 0;

font-size:20px;

}


</style>

</head>


<body>


<div id="wrapper">


<div class="header">

⚽ MUNDIAL FIFA 2026

<div class="tag">
ACTUALIZADO
</div>

</div>


<div id="content">

<div class="loading">
Cargando partidos...
</div>

</div>


</div>



<script>


const fuente =
"https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.json";



const nombres={


"France":"🇫🇷 Francia",
"Senegal":"🇸🇳 Senegal",

"Iraq":"🇮🇶 Irak",
"Iran":"🇮🇷 Irán",
"Norway":"🇳🇴 Noruega",

"Argentina":"🇦🇷 Argentina",
"Algeria":"🇩🇿 Argelia",

"Brazil":"🇧🇷 Brasil",
"Morocco":"🇲🇦 Marruecos",

"Spain":"🇪🇸 España",
"Germany":"🇩🇪 Alemania",

"Portugal":"🇵🇹 Portugal",

"Mexico":"🇲🇽 México",

"USA":"🇺🇸 Estados Unidos",
"United States":"🇺🇸 Estados Unidos",

"Canada":"🇨🇦 Canadá",

"England":"🏴 Inglaterra",
"Netherlands":"🇳🇱 Países Bajos"

};



const banderas={

"Argentina":"ar",
"France":"fr",
"Brazil":"br",
"Spain":"es",
"Germany":"de",
"Portugal":"pt",
"Mexico":"mx",
"USA":"us",
"Canada":"ca"

};




function limpiarHora(h){

if(!h)return "Horario";

return h.replace(/UTC-\d/g,"").trim();

}




function bandera(e){

if(!banderas[e]) return "";

return `
<img class="flag"
src="https://flagcdn.com/w40/${banderas[e]}.png">
`;

}




fetch(fuente+"?v="+Date.now())


.then(r=>r.json())


.then(data=>{


let partidos=data.matches;



let ahora=new Date();


let fecha=

ahora.getFullYear()+"-"+
String(ahora.getMonth()+1).padStart(2,"0")+"-"+
String(ahora.getDate()).padStart(2,"0");



let lista=partidos.filter(p=>

p.date.includes(fecha)

);



if(lista.length===0){

lista=partidos.slice(0,5);

}



let html="";



lista.forEach(p=>{


let marcador="";



if(p.score && p.score.ft){


marcador=`

<div class="score">

FINAL<br>

${p.score.ft[0]}
-
${p.score.ft[1]}

</div>

`;


}else{


marcador=`

<div class="time">

${limpiarHora(p.time)}

</div>

`;

}




let vivo="";


if(p.status=="LIVE"){


vivo=`

<div class="live">

🔴 EN VIVO ${p.minute||""}

</div>

`;

}



html+=`

<div class="match">


<div class="team">

${bandera(p.team1)}

${nombres[p.team1] || p.team1}

<br>

${bandera(p.team2)}

${nombres[p.team2] || p.team2}

</div>


<div>

${vivo}

${marcador}

</div>


</div>

`;



});




let argentina=partidos.find(p=>

p.team1=="Argentina" ||

p.team2=="Argentina"

);



if(argentina){


html+=`

<div class="next">

🇦🇷 Próximo partido Argentina:

${nombres[argentina.team1] || argentina.team1}

vs

${nombres[argentina.team2] || argentina.team2}

</div>

`;

}



document.getElementById("content").innerHTML=html;



})



.catch(error=>{


document.getElementById("content").innerHTML=

"Error cargando partidos";

});



// refresca cada 10 minutos

setInterval(()=>{

location.reload();

},600000);



</script>


</body>

</html>
