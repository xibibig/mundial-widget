<!DOCTYPE html>
<html lang="es">

<head>

<title>Widget Mundial FIFA 2026</title>

body{
margin:0;
background:transparent;
font-family:Arial,Helvetica,sans-serif;

#wrapper{

background:white;

border-radius:15px;

overflow:hidden;

box-shadow:0 5px 25px rgba(0,0,0,.25);

}

height:60px;

font-weight:bold;

}



.tag{

background:#ffd700;

color:#003b7a;

padding:7px 15px;

border-radius:20px;

font-size:12px;

}



.card{

display:flex;

justify-content:space-between;

align-items:center;

padding:12px 25px;

}



.team{

font-weight:bold;

line-height:28px;

}



.flag{

width:28px;
vertical-align:middle;

margin-right:6px;

}



.time{

color:white;

padding:8px 15px;

border-radius:8px;

}
